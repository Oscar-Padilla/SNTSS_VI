<!doctype html>
<html lang="es-MX">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SNTSS Sección VI — Capturas del prototipo</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  :root{ --purple:#801F82; --ink:#2A2230; --faint:#8A8290; --canvas:#FBF9FC; }
  html,body{ background:#0e0a10; font-family:Arial, Helvetica, sans-serif; color:var(--ink); }
  deck-stage:not(:defined){ visibility:hidden; }

  .sb{ position:relative; width:100%; height:100%; overflow:hidden; background:var(--canvas); }
  /* content slide: header arriba + captura completa centrada */
  .cs{ display:flex; flex-direction:column; padding:50px 70px 46px; background:#FBF9FC; }
  .cs::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:14px;
    background:linear-gradient(180deg,#9A2A9C,#571456); }
  .cs .head{ display:flex; align-items:flex-end; justify-content:space-between; gap:48px; padding-left:10px; }
  .cs .head .htxt{ max-width:1050px; }
  .cs .mark{ display:flex; align-items:center; gap:13px; margin-bottom:16px; }
  .cs .mark img{ width:46px; height:46px; object-fit:contain; }
  .cs .mark b{ font-size:18px; font-weight:800; color:#571456; }
  .cs .mark span{ font-size:13px; letter-spacing:.06em; text-transform:uppercase; color:#A78AA8; }
  .eyebrow2{ font-size:18px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--purple); display:flex; align-items:center; gap:12px; }
  .eyebrow2 i{ width:40px; height:3px; background:var(--purple); border-radius:3px; display:inline-block; }
  .cs h1{ font-size:48px; line-height:1.06; font-weight:800; letter-spacing:-.02em; color:var(--ink); margin-top:12px; }
  .cs .desc{ font-size:22px; line-height:1.45; color:#5C5363; width:500px; flex-shrink:0; padding-bottom:6px; }
  .cs .num{ font-size:120px; font-weight:800; color:#F1E2F1; line-height:.8; letter-spacing:-.04em; }
  .cs .stagearea{ flex:1; display:flex; align-items:center; justify-content:center; min-height:0; padding-top:26px; }
  .win{ width:1130px; max-height:100%; border-radius:20px; overflow:hidden; background:#fff;
    box-shadow:0 40px 90px rgba(78,22,80,.26), 0 14px 36px rgba(78,22,80,.16); border:1px solid #E6DEE8; }
  .win .bar{ height:52px; background:#F4EFF5; border-bottom:1px solid #E6DEE8; display:flex; align-items:center; gap:11px; padding:0 20px; }
  .win .bar .dot{ width:14px; height:14px; border-radius:50%; }
  .win .url{ margin-left:16px; flex:1; height:32px; background:#fff; border:1px solid #E6DEE8; border-radius:16px;
    display:flex; align-items:center; padding:0 16px; font-size:15px; color:var(--faint); gap:10px; max-width:560px; }
  .win .shot{ width:100%; height:auto; display:block; background:#fff; }

  /* cover */
  .cover{ background:linear-gradient(150deg,#9A2A9C 0%, #801F82 52%, #4E1250 100%); color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:90px; }
  .cover img.logo{ width:150px; height:150px; object-fit:contain; filter:drop-shadow(0 8px 22px rgba(0,0,0,.35)); margin-bottom:40px; }
  .cover .kicker{ font-size:23px; letter-spacing:.22em; text-transform:uppercase; color:#EEBCEE; font-weight:700; margin-bottom:26px; }
  .cover h1{ font-size:92px; font-weight:800; letter-spacing:-.025em; line-height:1.04; max-width:1400px; }
  .cover h1 em{ font-style:normal; color:#F4D24A; }
  .cover p{ font-size:30px; color:rgba(255,255,255,.85); margin-top:30px; }
  .cover .chips{ display:flex; gap:18px; margin-top:54px; flex-wrap:wrap; justify-content:center; }
  .cover .chip{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22); border-radius:999px;
    padding:16px 30px; font-size:23px; font-weight:700; display:flex; align-items:center; gap:12px; }
  .cover .chip span{ width:12px; height:12px; border-radius:50%; }
  .cover .deco{ position:absolute; border:3px dashed rgba(255,255,255,.22); border-radius:50%; }

  /* closing */
  .end{ background:linear-gradient(150deg,#571456 0%, #801F82 100%); color:#fff; padding:104px 130px; display:flex; flex-direction:column; height:100%; }
  .end .mark{ display:flex; align-items:center; gap:18px; margin-bottom:38px; }
  .end .mark img{ width:70px; height:70px; object-fit:contain; }
  .end .mark b{ font-size:26px; font-weight:800; }
  .end h1{ font-size:72px; font-weight:800; letter-spacing:-.02em; margin-bottom:46px; }
  .end ul{ list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:30px 60px; max-width:1500px; }
  .end li{ display:flex; gap:22px; align-items:flex-start; font-size:26px; line-height:1.45; }
  .end li b{ display:block; font-size:30px; margin-bottom:4px; }
  .end li p{ color:rgba(255,255,255,.82); }
  .end .ck{ width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,.16); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:26px; }
  .end .foot{ margin-top:auto; padding-top:46px; border-top:1px solid rgba(255,255,255,.2); font-size:23px; color:rgba(255,255,255,.82); display:flex; gap:40px; }
</style>
</head>
<body>
  <deck-stage width="1920" height="1080" id="deck"></deck-stage>

  <script>
    const LOGO = "assets/logo.png";
    const slides = [
      { type:"cover" },
      { eyebrow:"Portal público", title:"Una sola plataforma para toda la sección",
        desc:"Página de inicio con la identidad del sindicato: quiénes somos, eventos, noticias y acceso directo a la credencial digital.",
        url:"sntss-seccion6.mx", shot:"screenshots/slides/01-s.png" },
      { eyebrow:"Portal público", title:"Cómo funciona, explicado simple",
        desc:"Credencial con QR, documentos que se guardan una sola vez, registro de asistencia ágil y datos protegidos por ley.",
        url:"sntss-seccion6.mx/#como-funciona", shot:"screenshots/slides/02-s.png" },
      { eyebrow:"Portal público", title:"Eventos y convocatorias",
        desc:"Cada secretaría publica sus convocatorias con cupo en tiempo real. El trabajador se inscribe con un clic.",
        url:"sntss-seccion6.mx/eventos", shot:"screenshots/slides/03-s.png" },
      { eyebrow:"Trabajador · Paso 1", title:"Inscripción: identidad",
        desc:"El trabajador valida sus datos contra el padrón sindical una sola vez. Proceso guiado en cuatro pasos.",
        url:"sntss-seccion6.mx/credencial", shot:"screenshots/slides/04-s.png" },
      { eyebrow:"Trabajador · Paso 3", title:"Documentos sin repetir",
        desc:"Lo ya entregado aparece como “guardado”. El sistema solo acepta el formato correcto y avisa si hay un error.",
        url:"sntss-seccion6.mx/credencial", shot:"screenshots/slides/01-t.png" },
      { eyebrow:"Trabajador · Resultado", title:"Credencial digital con QR",
        desc:"Un identificador único que sirve para todos los eventos del año y funciona como firma de asistencia. Se guarda en la billetera del celular.",
        url:"sntss-seccion6.mx/credencial", shot:"screenshots/slides/02-t.png" },
      { eyebrow:"Administración", title:"Panel de la secretaría",
        desc:"Igualdad Sustantiva administra su propio espacio: inscripciones, asistencia y documentos por revisar, en tiempo real.",
        url:"admin.sntss-seccion6.mx", shot:"screenshots/slides/03-t.png" },
      { eyebrow:"Administración", title:"Inscritos y asistencia",
        desc:"Lista filtrable, escaneo de QR para registrar asistencia y exportación a Excel o PDF. Adiós a las listas en papel.",
        url:"admin.sntss-seccion6.mx/inscritos", shot:"screenshots/slides/01-v.png" },
      { eyebrow:"Administración", title:"Estadísticas por unidad",
        desc:"Inscripciones y asistencia filtrables por hospital o unidad médica, con comparativos entre años.",
        url:"admin.sntss-seccion6.mx/estadisticas", shot:"screenshots/slides/02-v.png" },
      { eyebrow:"Administración", title:"Crear convocatoria",
        desc:"La secretaría crea eventos con cupo, fechas, requisitos y foto, sin depender de nadie. Con vista previa en vivo.",
        url:"admin.sntss-seccion6.mx/convocatorias/nueva", shot:"screenshots/slides/03-v.png" },
      { eyebrow:"Portal público", title:"Directiva y delegados",
        desc:"Secretario general, comité ejecutivo y delegados de cada unidad, con su área de responsabilidad.",
        url:"sntss-seccion6.mx/directiva", shot:"screenshots/slides/03-u.png" },
      { type:"end" },
    ];
    const dots = '<span class="dot" style="background:#F45B5B"></span><span class="dot" style="background:#F4B83B"></span><span class="dot" style="background:#46C46B"></span>';
    const total = slides.length;

    function content(s, n){
      return `<div class="sb cs">
        <div class="head">
          <div class="htxt">
            <div class="mark"><img src="${LOGO}" alt=""><b>SNTSS Sección VI</b><span>Yucatán</span></div>
            <div class="eyebrow2"><i></i>${s.eyebrow}</div>
            <h1>${s.title}</h1>
          </div>
          <div class="desc">${s.desc}</div>
        </div>
        <div class="stagearea">
          <div class="win"><div class="bar">${dots}<div class="url">🔒 ${s.url}</div></div>
          <img class="shot" src="${s.shot}" alt="${s.title}"></div>
        </div>
      </div>`;
    }
    function cover(){
      return `<div class="sb cover">
        <span class="deco" style="width:520px;height:520px;top:-180px;right:-120px"></span>
        <span class="deco" style="width:300px;height:300px;bottom:-110px;left:-60px"></span>
        <img class="logo" src="${LOGO}" alt="SNTSS">
        <div class="kicker">Prototipo de plataforma digital</div>
        <h1>Tu sindicato, <em>más cerca</em><br>y en un solo lugar</h1>
        <p>SNTSS Sección VI · Yucatán</p>
        <div class="chips">
          <div class="chip"><span style="background:#F0C9F0"></span>Portal informativo</div>
          <div class="chip"><span style="background:#F4D24A"></span>Credencial con QR</div>
          <div class="chip"><span style="background:#7FE3D2"></span>Panel de administración</div>
        </div>
      </div>`;
    }
    function end(){
      const items = [
        ["Sumar Previsión Social","Replicar el panel para la secretaría de Cecilia: ~3,600 personas, validación de derechos y talón."],
        ["Cargar contenido real","Fotos, delegados, noticias y convocatorias verdaderas de la sección."],
        ["Dominio propio","Publicar bajo un dominio nuevo y exclusivo de la Sección VI."],
        ["Capacitación","Acompañar a cada secretaría para que administre su espacio de forma autónoma."],
      ];
      return `<div class="sb end">
        <div class="mark"><img src="${LOGO}" alt=""><b>SNTSS Sección VI · Yucatán</b></div>
        <h1>Siguientes pasos</h1>
        <ul>${items.map(([t,d])=>`<li><span class="ck">✓</span><div><b>${t}</b><p>${d}</p></div></li>`).join('')}</ul>
        <div class="foot"><span>contacto@sntss-seccion6.mx</span><span>Conforme a la Ley General de Protección de Datos Personales</span></div>
      </div>`;
    }

    const deck = document.getElementById("deck");
    let n = 0, html = "";
    const labels = ["Portada","Inicio","Cómo funciona","Eventos","Identidad","Documentos","Credencial QR","Panel","Inscritos","Estadísticas","Convocatoria","Directiva","Siguientes pasos"];
    slides.forEach((s)=>{
      n++;
      let inner;
      if(s.type==="cover") inner = cover();
      else if(s.type==="end") inner = end();
      else inner = content(s, n);
      html += `<section data-label="${labels[n-1]}">${inner}</section>`;
    });
    deck.innerHTML = html;
  </script>
  <script src="deck-stage.js"></script>
</body>
</html>
